    ReportFilterDefinition:
      type: object
      required:
        - filterName
        - displayName
        - filterType
        - applicableReportTypes
        - required
      properties:
        filterName:
          type: string
          example: drugLibraryVersion
        displayName:
          type: string
          example: Drug Library
        filterType:
          type: string
          enum:
            - SINGLE_SELECT
            - MULTI_SELECT
            - DATE_RANGE
            - TEXT_SEARCH
            - TOGGLE
            - TREE_SELECT
          example: SINGLE_SELECT
        applicableReportTypes:
          type: array
          items:
            $ref: "#/components/schemas/ReportType"
          example:
            - COMPLIANCE
            - LIMITS
            - DEVICE_USAGE
        required:
          type: boolean
          example: true
        defaultValue:
          nullable: true
          description: Optional default value for the filter.
        dependsOn:
          type: array
          description: Other filters that must be selected before this filter is populated.
          items:
            type: string
          example:
            - drugLibraryVersion
        valueSource:
          type: string
          description: Logical source for UI to resolve filter values.
          enum:
            - DRUG_LIBRARIES
            - DRUG_LIBRARY_VERSIONS
            - CARE_AREAS
            - DRUGS
            - PUMP_TYPES
            - ENTERPRISE_HIERARCHY
            - DEVICES
