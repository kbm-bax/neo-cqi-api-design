        targetContexts:
          type: array
          items:
            $ref: "#/components/schemas/SourceContext"
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/ReconciliationStatus"

    ReconciliationSummaryListResponse:
      type: object
