        parameters:
          type: object
          additionalProperties: true

    QualityGateResultResponse:
      type: object
      required:
        - result
      properties:
        result:
          $ref: "#/components/schemas/QualityGateResult"

    QualityGateResult:
      type: object
      properties:
        qualityGateId:
          type: string
          example: "QG-10001"
        gateName:
          type: string
          example: "Compliance Projection Completeness"
        status:
          $ref: "#/components/schemas/QualityGateStatus"
        evaluatedAt:
          type: string
          format: date-time
          nullable: true
        evaluatedDataset:
          type: string
          nullable: true
          example: "COMPLIANCE"
        blocking:
          type: boolean
          example: true
        ruleResults:
          type: array
          items:
            $ref: "#/components/schemas/QualityGateRuleResult"

    QualityGateRuleResult:
      type: object
      properties:
