openapi: 3.0.3

info:
  title: CQI Compliance API
  version: 1.0.0
  description: |
    CQI Compliance API for Neo CQI.

    This API provides compliance summary, breakdown, trend, infusion listing,
    infusion-level compliance details, evaluation findings, and export support.

    The API is intentionally storage-agnostic. It does not expose SQL,
    lakehouse zones, table names, or physical schema details.

servers:
  - url: /api/cqi/v1
    description: CQI API v1

security:
  - bearerAuth: []

tags:
  - name: Compliance Summary
    description: Compliance KPI and aggregate metrics.
  - name: Compliance Breakdown
    description: Compliance grouped by CQI business dimensions.
  - name: Compliance Trends
    description: Compliance over time.
  - name: Compliance Infusions
    description: Infusion-level compliance query and details.
  - name: Compliance Evaluation
    description: Compliance evaluation findings for a selected infusion.
  - name: Compliance Exports
    description: Export compliance data.

paths:

  /compliance/summary-query:
    post:
      tags:
        - Compliance Summary
      operationId: getComplianceSummary
      summary: Get compliance summary
      description: |
        Returns aggregate compliance metrics for a selected infusion population.

        This endpoint is used by CQI dashboards, KPI widgets, report headers,
        and executive summary views.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceSummaryRequest"
            examples:
              default:
                summary: Compliance summary request
                value:
                  filters:
                    dateRange:
                      from: "2026-01-01T00:00:00Z"
                      to: "2026-01-31T23:59:59Z"
                    drugLibraryVersionIds:
                      - "DLV-1002"
                    careAreaIds:
                      - "CA-ICU"
                    pumpTypes:
                      - "LVP"
                    enterpriseHierarchyNodeIds:
                      - "EH-100"
      responses:
        "200":
          description: Compliance summary returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceSummaryResponse"
              examples:
                success:
                  value:
                    summary:
                      totalInfusions: 120542
                      compliantInfusions: 117200
                      nonCompliantInfusions: 3342
                      unknownComplianceInfusions: 0
                      complianceRate: 97.23
                    evaluationContext:
                      evaluatedAgainstDrugLibraryVersionIds:
                        - "DLV-1002"
                      complianceDefinitionVersion: "COMPLIANCE-RULESET-1.0"
                    dataFreshness:
                      asOf: "2026-07-07T04:00:00Z"
                      watermark: "wm-20260707-040000"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /compliance/breakdown-query:
    post:
      tags:
        - Compliance Breakdown
      operationId: getComplianceBreakdown
      summary: Get compliance breakdown
      description: |
        Returns compliance metrics grouped by a selected CQI business dimension,
        such as care area, drug, pump type, or enterprise hierarchy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceBreakdownRequest"
            examples:
              byCareArea:
                summary: Compliance breakdown by care area
                value:
                  groupBy: "CARE_AREA"
                  filters:
                    dateRange:
                      from: "2026-01-01T00:00:00Z"
                      to: "2026-01-31T23:59:59Z"
                    drugLibraryVersionIds:
                      - "DLV-1002"
      responses:
        "200":
          description: Compliance breakdown returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceBreakdownResponse"
              examples:
                success:
                  value:
                    groupBy: "CARE_AREA"
                    items:
                      - id: "CA-ICU"
                        name: "ICU"
                        totalInfusions: 2000
                        compliantInfusions: 1962
                        nonCompliantInfusions: 38
                        complianceRate: 98.1
                      - id: "CA-ER"
                        name: "Emergency"
                        totalInfusions: 1000
                        compliantInfusions: 943
                        nonCompliantInfusions: 57
                        complianceRate: 94.3
                    dataFreshness:
                      asOf: "2026-07-07T04:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /compliance/trends-query:
    post:
      tags:
        - Compliance Trends
      operationId: getComplianceTrends
      summary: Get compliance trend
      description: |
        Returns compliance metrics over time using the requested time granularity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceTrendRequest"
            examples:
              dailyTrend:
                summary: Daily compliance trend
                value:
                  granularity: "DAILY"
                  filters:
                    dateRange:
                      from: "2026-01-01T00:00:00Z"
                      to: "2026-01-31T23:59:59Z"
                    drugLibraryVersionIds:
                      - "DLV-1002"
      responses:
        "200":
          description: Compliance trend returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceTrendResponse"
              examples:
                success:
                  value:
                    granularity: "DAILY"
                    points:
                      - periodStart: "2026-01-01T00:00:00Z"
                        periodEnd: "2026-01-01T23:59:59Z"
                        totalInfusions: 4020
                        compliantInfusions: 3910
                        nonCompliantInfusions: 110
                        complianceRate: 97.26
                      - periodStart: "2026-01-02T00:00:00Z"
                        periodEnd: "2026-01-02T23:59:59Z"
                        totalInfusions: 4180
                        compliantInfusions: 4070
                        nonCompliantInfusions: 110
                        complianceRate: 97.37
                    dataFreshness:
                      asOf: "2026-07-07T04:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /compliance/infusions-query:
    post:
      tags:
        - Compliance Infusions
      operationId: searchComplianceInfusions
      summary: Search compliance infusions
      description: |
        Returns infusion-level compliance rows for CQI grids, drill-down,
        and export preparation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceInfusionQueryRequest"
            examples:
              nonCompliant:
                summary: Non-compliant infusion query
                value:
                  filters:
                    dateRange:
                      from: "2026-01-01T00:00:00Z"
                      to: "2026-01-31T23:59:59Z"
                    drugLibraryVersionIds:
                      - "DLV-1002"
                    complianceStatuses:
                      - "NON_COMPLIANT"
                  page:
                    pageNumber: 1
                    pageSize: 50
                  sort:
                    field: "startedAt"
                    direction: "DESC"
      responses:
        "200":
          description: Compliance infusions returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceInfusionListResponse"
              examples:
                success:
                  value:
                    items:
                      - infusionId: "INF-123"
                        deviceId: "DEV-100"
                        deviceSerialNumber: "SN001"
                        pumpType: "LVP"
                        drugLibraryVersionId: "DLV-1002"
                        careAreaId: "CA-ICU"
                        careAreaName: "ICU"
                        drugId: "DRUG-HEPARIN"
                        drugName: "Heparin"
                        complianceStatus: "NON_COMPLIANT"
                        startedAt: "2026-01-02T10:30:00Z"
                        endedAt: "2026-01-02T12:10:00Z"
                    page:
                      pageNumber: 1
                      pageSize: 50
                      hasMore: true
                    dataFreshness:
                      asOf: "2026-07-07T04:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /compliance/infusions/{infusionId}:
    get:
      tags:
        - Compliance Infusions
      operationId: getComplianceInfusionById
      summary: Get compliance infusion details
      description: |
        Returns compliance-related details for a selected infusion.
      parameters:
        - $ref: "#/components/parameters/InfusionId"
      responses:
        "200":
          description: Compliance infusion detail returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceInfusionDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /compliance/infusions/{infusionId}/evaluation:
    get:
      tags:
        - Compliance Evaluation
      operationId: getComplianceEvaluation
      summary: Get infusion compliance evaluation
      description: |
        Returns the compliance evaluation result and findings for a selected
        infusion. This endpoint is used to explain why an infusion is compliant,
        non-compliant, or unknown.
      parameters:
        - $ref: "#/components/parameters/InfusionId"
      responses:
        "200":
          description: Compliance evaluation returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceEvaluationResponse"
              examples:
                nonCompliant:
                  value:
                    infusionId: "INF-123"
                    complianceStatus: "NON_COMPLIANT"
                    evaluatedAt: "2026-07-07T04:00:00Z"
                    evaluatedAgainst:
                      drugLibraryVersionId: "DLV-1002"
                      careAreaId: "CA-ICU"
                      drugId: "DRUG-HEPARIN"
                    findings:
                      - findingCode: "PROGRAMMED_VALUE_OUTSIDE_POLICY"
                        severity: "HIGH"
                        description: "Programmed value was outside the configured drug library policy."
                        occurredAt: "2026-01-02T10:35:00Z"
                    dataFreshness:
                      asOf: "2026-07-07T04:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /compliance/exports:
    post:
      tags:
        - Compliance Exports
      operationId: createComplianceExport
      summary: Create compliance export
      description: |
        Creates an export request for compliance data based on supplied filters.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceExportRequest"
      responses:
        "202":
          description: Export request accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceExportAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /compliance/exports/{exportId}:
    get:
      tags:
        - Compliance Exports
      operationId: getComplianceExportStatus
      summary: Get compliance export status
      description: |
        Returns status and download metadata for a compliance export request.
      parameters:
        - $ref: "#/components/parameters/ExportId"
      responses:
        "200":
          description: Export status returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceExportStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:

    InfusionId:
      name: infusionId
      in: path
      required: true
      schema:
        type: string
      example: "INF-123"

    ExportId:
      name: exportId
      in: path
      required: true
      schema:
        type: string
      example: "EXP-1001"

  responses:

    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Authentication is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Caller does not have access to the requested resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    ComplianceSummaryRequest:
      type: object
      required:
        - filters
      properties:
        filters:
          $ref: "#/components/schemas/ComplianceFilter"

    ComplianceBreakdownRequest:
      type: object
      required:
        - groupBy
        - filters
      properties:
        groupBy:
          $ref: "#/components/schemas/ComplianceGroupBy"
        filters:
          $ref: "#/components/schemas/ComplianceFilter"

    ComplianceTrendRequest:
      type: object
      required:
        - granularity
        - filters
      properties:
        granularity:
          $ref: "#/components/schemas/TrendGranularity"
        filters:
          $ref: "#/components/schemas/ComplianceFilter"

    ComplianceInfusionQueryRequest:
      type: object
      required:
        - filters
      properties:
        filters:
          $ref: "#/components/schemas/ComplianceFilter"
        page:
          $ref: "#/components/schemas/PageRequest"
        sort:
          $ref: "#/components/schemas/SortRequest"

    ComplianceExportRequest:
      type: object
      required:
        - filters
        - exportFormat
      properties:
        filters:
          $ref: "#/components/schemas/ComplianceFilter"
        exportFormat:
          $ref: "#/components/schemas/ExportFormat"
        columns:
          type: array
          items:
            type: string
          example:
            - "infusionId"
            - "deviceSerialNumber"
            - "careAreaName"
            - "drugName"
            - "complianceStatus"
            - "startedAt"

    ComplianceFilter:
      type: object
      properties:
        dateRange:
          $ref: "#/components/schemas/DateRange"

        drugLibraryVersionIds:
          type: array
          items:
            type: string
          example:
            - "DLV-1002"

        careAreaIds:
          type: array
          items:
            type: string
          example:
            - "CA-ICU"

        drugIds:
          type: array
          items:
            type: string
          example:
            - "DRUG-HEPARIN"

        deviceIds:
          type: array
          items:
            type: string
          example:
            - "DEV-100"

        deviceSerialNumbers:
          type: array
          items:
            type: string
          example:
            - "SN001"

        pumpTypes:
          type: array
          items:
            type: string
          example:
            - "LVP"
            - "SYR"

        enterpriseHierarchyNodeIds:
          type: array
          items:
            type: string
          example:
            - "EH-100"

        complianceStatuses:
          type: array
          items:
            $ref: "#/components/schemas/ComplianceStatus"

    DateRange:
      type: object
      required:
        - from
        - to
      properties:
        from:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"
        to:
          type: string
          format: date-time
          example: "2026-01-31T23:59:59Z"

    ComplianceSummaryResponse:
      type: object
      required:
        - summary
        - dataFreshness
      properties:
        summary:
          $ref: "#/components/schemas/ComplianceSummary"
        evaluationContext:
          $ref: "#/components/schemas/ComplianceEvaluationContext"
        dataFreshness:
          $ref: "#/components/schemas/DataFreshness"

    ComplianceBreakdownResponse:
      type: object
      required:
        - groupBy
        - items
        - dataFreshness
      properties:
        groupBy:
          $ref: "#/components/schemas/ComplianceGroupBy"
        items:
          type: array
          items:
            $ref: "#/components/schemas/ComplianceBreakdownItem"
        dataFreshness:
          $ref: "#/components/schemas/DataFreshness"

    ComplianceTrendResponse:
      type: object
      required:
        - granularity
        - points
        - dataFreshness
      properties:
        granularity:
          $ref: "#/components/schemas/TrendGranularity"
        points:
          type: array
          items:
            $ref: "#/components/schemas/ComplianceTrendPoint"
        dataFreshness:
          $ref: "#/components/schemas/DataFreshness"

    ComplianceInfusionListResponse:
      type: object
      required:
        - items
        - page
        - dataFreshness
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ComplianceInfusion"
        page:
          $ref: "#/components/schemas/PageMetadata"
        dataFreshness:
