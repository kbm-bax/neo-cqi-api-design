        targetContext:
          $ref: "#/components/schemas/SourceContext"
        dateRange:
          $ref: "#/components/schemas/DateRange"
        sourceCount:
          type: integer
          minimum: 0
        targetCount:
          type: integer
          minimum: 0
        matchedCount:
          type: integer
          minimum: 0
        missingCount:
          type: integer
          minimum: 0
        extraCount:
          type: integer
          minimum: 0
        duplicateCount:
          type: integer
